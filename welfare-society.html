<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unity Welfare Society — Food Pack System</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/nafeespp/jameel-noori-nastaleeq-webfont@master/style.css">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getDatabase, ref, onValue, push, set, update, remove }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyDgj2a6MK9iEXlJ7hvJYNVxrOTneQjkmHM",
    authDomain:        "welfare-society-f517a.firebaseapp.com",
    databaseURL:       "https://welfare-society-f517a-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId:         "welfare-society-f517a",
    storageBucket:     "welfare-society-f517a.firebasestorage.app",
    messagingSenderId: "welfare-society-f517a.firebasestorage.app",
    appId:             "1:57174497928:web:2995ebe9a1a8a3b1315d3d"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);
  window._fb = { auth, db, ref, onValue, push, set, update, remove, signInWithEmailAndPassword, signOut, onAuthStateChanged };
</script>

<style>
:root{
  --blue-dark:#001f3f; --blue-navy:#003366; --blue-primary:#185fa5;
  --blue-light:#e6f1fb; --blue-pale:#f0f7ff;
  --bg:#f4f7f6; --surface:#ffffff; --border:#d4dde4;
  --text:#1a202c; --text-muted:#5a6a7a; --text-light:#8aa0b0;
  --radius:10px; --radius-lg:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}

.urdu-field { font-family: 'Jameel Noori Nastaleeq', serif !important; font-size: 1.35rem !important; direction: rtl; text-align: right; }

/* LAYOUT */
#loading-overlay{position:fixed;inset:0;background:var(--blue-dark);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999}
.sidebar{width:220px;background:var(--blue-dark);position:fixed;top:0;left:0;bottom:0;z-index:50;color:#fff}
.sidebar-logo{padding:25px 20px; border-bottom:1px solid rgba(255,255,255,0.1)}
.nav-link{display:block;padding:12px 20px;color:rgba(255,255,255,0.6);cursor:pointer;border:none;background:none;width:100%;text-align:left;font-weight:500}
.nav-link.active{background:rgba(255,255,255,0.1);color:#fff}
.main{margin-left:220px;flex:1}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:15px 30px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:40}

/* UI COMPONENTS */
.card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);margin:20px;overflow:hidden;box-shadow: 0 2px 5px rgba(0,0,0,0.05)}
.card-header{padding:15px 20px; background:var(--blue-pale); border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;padding:20px}
.stat-box{background:#fff;padding:20px;border-radius:12px;border:1px solid var(--border);border-left:5px solid var(--blue-primary)}
.data-table{width:100%;border-collapse:collapse}
.data-table th{text-align:left;padding:12px 20px;background:#f8fafc;font-size:11px;color:var(--text-light);text-transform:uppercase}
.data-table td{padding:12px 20px;border-bottom:1px solid #f1f5f9; vertical-align: middle;}

/* FANCY PRINT CARDS - 6 Per Page */
.print-grid { 
    display: grid; 
    grid-template-columns: 1fr 1fr; 
    grid-template-rows: repeat(3, 1fr); 
    gap: 15px; 
    padding: 10px; 
    width: 210mm; /* A4 Width */
    height: 297mm; /* A4 Height */
    margin: 0 auto;
}
.bcard { 
    border: 2px solid var(--blue-navy); 
    outline: 4px solid var(--blue-navy);
    outline-offset: -10px;
    border-radius: 8px; 
    display: flex; 
    flex-direction: column; 
    overflow: hidden; 
    background:#fff;
    position: relative;
}
.bcard-head { 
    background: var(--blue-navy); 
    color: #fff; 
    padding: 15px 10px; 
    text-align: center; 
}
.bcard-body { 
    padding: 20px 25px; 
    flex: 1; 
    background-image: linear-gradient(var(--blue-pale) 1px, transparent 1px);
    background-size: 100% 30px;
}
.bcard-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid #ddd; }
.bcard-row span:first-child { font-weight: bold; font-size: 10px; color: var(--blue-navy); }
.bcard-foot { 
    background: var(--blue-navy); 
    color: #fff;
    padding: 8px 15px; 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:200}
.modal-overlay.open{display:flex}
.modal{background:#fff;padding:30px;border-radius:15px;width:500px;max-width:90%}
.btn{padding:10px 20px;border-radius:8px;cursor:pointer;border:1px solid var(--border);font-weight:600}
.btn-primary{background:var(--blue-primary);color:#fff;border:none}
.btn-danger{color:#d32f2f; background:#fff5f5}

@media print {
    @page { size: A4 portrait; margin: 0; }
    body { background: #fff; }
    .sidebar, .topbar, .no-print, #loading-overlay { display: none !important; }
    .main { margin-left: 0 !important; }
    .tab-section { display: none !important; }
    #tab-cards { display: block !important; }
    .print-grid { page-break-after: always; padding: 0; }
}
</style>
</head>
<body>

<div id="loading-overlay"><div style="color:#fff">Syncing Unity Welfare System...</div></div>

<div id="login-screen" style="display:none; align-items:center; justify-content:center; min-height:100vh; background:var(--blue-dark)">
  <div style="background:#fff; padding:40px; border-radius:15px; width:350px">
    <h2 style="margin-bottom:20px; text-align:center">UWS Portal</h2>
    <input type="email" id="login-email" placeholder="Email" style="width:100%; padding:10px; margin-bottom:10px">
    <input type="password" id="login-pass" placeholder="Password" style="width:100%; padding:10px; margin-bottom:20px">
    <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Sign In</button>
  </div>
</div>

<div id="app-shell" style="display:none">
  <aside class="sidebar">
    <div class="sidebar-logo"><h2 style="font-family:Amiri; padding-left: 10px;">UWS Pakistan</h2></div>
    <nav style="margin-top:20px">
      <button class="nav-link active" onclick="switchTab('dashboard')">Dashboard</button>
      <button class="nav-link" onclick="switchTab('beneficiaries')">Beneficiaries</button>
      <button class="nav-link" onclick="switchTab('cards')">Print Cards</button>
      <button class="nav-link" onclick="switchTab('villages')">Manage Villages</button>
    </nav>
    <button onclick="doLogout()" style="position:absolute; bottom:20px; left:20px; color:#fff; background:none; border:none; cursor:pointer">Logout ⏻</button>
  </aside>

  <main class="main">
    <header class="topbar">
      <h1 id="page-title" style="font-size:20px">Dashboard</h1>
      <button class="btn btn-primary no-print" onclick="openAdd()">+ Add Beneficiary</button>
    </header>

    <div class="content">
      <div id="tab-dashboard" class="tab-section">
        <div class="stats-grid" id="stats-summary"></div>
        <div class="card">
            <div class="card-header"><h3>Village Statistics</h3></div>
            <table class="data-table"><thead><tr><th>Village</th><th>Total</th><th>Zakat</th><th>Sadaqa</th></tr></thead><tbody id="dash-village-table"></tbody></table>
        </div>
      </div>

      <div id="tab-beneficiaries" class="tab-section" style="display:none">
        <div class="card">
          <div style="padding:15px; border-bottom:1px solid #eee; display:flex; gap:10px">
            <input type="text" id="search-input" placeholder="Search by name..." style="flex:1; padding:8px" oninput="renderTable()">
            <select id="filter-village" onchange="renderTable()" style="padding:8px"><option value="">All Villages</option></select>
          </div>
          <table class="data-table">
            <thead><tr><th>Name</th><th>Father Name</th><th>Caste</th><th>Village</th><th>Actions</th></tr></thead>
            <tbody id="main-table-body"></tbody>
          </table>
        </div>
      </div>

      <div id="tab-cards" class="tab-section" style="display:none">
        <div class="no-print" style="padding:20px; background: #fff; margin: 20px; border-radius: 10px; border: 1px solid var(--border); display: flex; align-items: center; gap: 15px;">
            <div>
                <label style="font-size: 12px; font-weight: bold; display: block; margin-bottom: 5px;">1. Select Village</label>
                <select id="print-filter" onchange="renderCards()" style="padding:10px"><option value="">Select Village</option></select>
            </div>
            <div>
                <label style="font-size: 12px; font-weight: bold; display: block; margin-bottom: 5px;">2. Distribution Date</label>
                <input type="date" id="print-date" onchange="renderCards()" style="padding:8px; border: 1px solid var(--border); border-radius: 5px;">
            </div>
            <div style="margin-left: auto; align-self: flex-end;">
                <button class="btn btn-primary" onclick="window.print()">Print Cards (6 per page)</button>
            </div>
        </div>
        <div id="cards-container"></div>
      </div>

      <div id="tab-villages" class="tab-section" style="display:none">
        <div class="card">
            <div class="card-header"><h3>Manage Villages</h3><button class="btn btn-sm btn-primary" onclick="addVillage()">+ Add Village</button></div>
            <div id="village-list" style="padding:20px; display:flex; gap:10px; flex-wrap:wrap"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 style="margin-bottom:20px">Beneficiary Information</h3>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px">
      <div><label>Card No</label><input id="f-cardno" style="width:100%; padding:8px"></div>
      <div><label>Village</label><select id="f-village" style="width:100%; padding:8px"></select></div>
      <div style="grid-column: span 2"><label>Name (Urdu)</label><input id="f-name" class="urdu-field" style="width:100%; padding:5px"></div>
      <div style="grid-column: span 2"><label>Father Name (Urdu)</label><input id="f-father" class="urdu-field" style="width:100%; padding:5px"></div>
      <div style="grid-column: span 2"><label>Caste (Urdu)</label><input id="f-caste" class="urdu-field" style="width:100%; padding:5px"></div>
      <div><label>Category</label><select id="f-category" style="width:100%; padding:8px"><option>Zakat</option><option>Sadaqa</option></select></div>
    </div>
    <div style="margin-top:25px; display:flex; justify-content:flex-end; gap:10px">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveRecord()">Save Beneficiary</button>
    </div>
  </div>
</div>

<script>
let data = {}, villages = [], editId = null;

function waitFB(cb) { if (window._fb) cb(); else setTimeout(() => waitFB(cb), 100); }
waitFB(() => {
  window._fb.onAuthStateChanged(window._fb.auth, user => {
    document.getElementById('loading-overlay').style.display='none';
    if(user) {
        document.getElementById('app-shell').style.display='block';
        document.getElementById('login-screen').style.display='none';
        listenToData();
    } else {
        document.getElementById('app-shell').style.display='none';
        document.getElementById('login-screen').style.display='flex';
    }
  });
});

function doLogin() {
  const e = document.getElementById('login-email').value, p = document.getElementById('login-pass').value;
  window._fb.signInWithEmailAndPassword(window._fb.auth, e, p).catch(err => alert(err.message));
}
function doLogout() { window._fb.signOut(window._fb.auth); }

function listenToData() {
  const {db,ref,onValue} = window._fb;
  onValue(ref(db,'villages'), snap => {
    villages = snap.exists() ? Object.values(snap.val()) : [];
    updateVillageSelects();
  });
  onValue(ref(db,'beneficiaries'), snap => {
    data = snap.exists() ? snap.val() : {};
    refreshAll();
  });
}

function updateVillageSelects() {
    const h = villages.map(v => `<option value="${v}">${v}</option>`).join('');
    document.getElementById('f-village').innerHTML = h;
    document.getElementById('filter-village').innerHTML = '<option value="">All Villages</option>' + h;
    document.getElementById('print-filter').innerHTML = '<option value="">Select Village</option>' + h;
    renderVillageList();
}

function refreshAll() { renderDashboard(); renderTable(); renderCards(); }

function renderDashboard() {
    const arr = Object.values(data);
    document.getElementById('stats-summary').innerHTML = `
        <div class="stat-box"><div>Total Families</div><div style="font-size:24px; font-weight:700">${arr.length}</div></div>
        <div class="stat-box"><div>Zakat</div><div style="font-size:24px; font-weight:700">${arr.filter(x=>x.category==='Zakat').length}</div></div>
        <div class="stat-box"><div>Sadaqa</div><div style="font-size:24px; font-weight:700">${arr.filter(x=>x.category==='Sadaqa').length}</div></div>`;
    
    document.getElementById('dash-village-table').innerHTML = villages.map(v => {
        const vd = arr.filter(x => x.village === v);
        return `<tr><td>${v}</td><td>${vd.length}</td><td>${vd.filter(x=>x.category==='Zakat').length}</td><td>${vd.filter(x=>x.category==='Sadaqa').length}</td></tr>`;
    }).join('');
}

function renderTable() {
    const q = document.getElementById('search-input').value.toLowerCase();
    const fv = document.getElementById('filter-village').value;
    const items = Object.entries(data).filter(([id, d]) => {
        const matchesQuery = !q || `${d.name}`.toLowerCase().includes(q);
        const matchesVillage = !fv || d.village === fv;
        return matchesQuery && matchesVillage;
    });
    document.getElementById('main-table-body').innerHTML = items.map(([id, d]) => `
        <tr>
            <td class="urdu-field">${d.name}</td>
            <td class="urdu-field">${d.father}</td>
            <td class="urdu-field">${d.caste||'—'}</td>
            <td class="urdu-field">${d.village}</td>
            <td>
                <button class="btn btn-sm" onclick="openEdit('${id}')">Edit</button>
                <button class="btn btn-sm btn-danger" onclick="deleteRecord('${id}')">Del</button>
            </td>
        </tr>`).join('');
}

function renderCards() {
    const v = document.getElementById('print-filter').value;
    const dDate = document.getElementById('print-date').value || '__________';
    const arr = v ? Object.values(data).filter(d => d.village === v) : [];
    const pages = []; for(let i=0; i<arr.length; i+=6) pages.push(arr.slice(i, i+6));
    
    document.getElementById('cards-container').innerHTML = pages.map(p => `
        <div class="print-grid">${p.map(d => `
            <div class="bcard">
                <div class="bcard-head">
                    <h4 style="font-family:Amiri; font-size: 20px; letter-spacing: 1px;">UNITY WELFARE SOCIETY</h4>
                    <p style="font-size: 9px; margin-top: 2px; font-weight: bold; opacity: 0.8;">FOOD PACK DISTRIBUTION CARD</p>
                </div>
                <div class="bcard-body">
                    <div class="bcard-row"><span>NAME</span><span class="urdu-field">${d.name}</span></div>
                    <div class="bcard-row"><span>FATHER</span><span class="urdu-field">${d.father}</span></div>
                    <div class="bcard-row"><span>VILLAGE</span><span class="urdu-field" style="font-size: 1.1rem !important;">${d.village}</span></div>
                    <div class="bcard-row"><span>CASTE</span><span class="urdu-field" style="font-size: 1.1rem !important;">${d.caste||'—'}</span></div>
                    <div class="bcard-row"><span>DATE</span><span style="font-weight: bold; color: #000;">${dDate}</span></div>
                </div>
                <div class="bcard-foot">
                    <span style="font-family:Amiri; font-weight:700; font-size: 16px;">${d.cardNo}</span>
                    <span style="font-size: 11px; font-weight: 800; text-transform: uppercase;">${d.category}</span>
                </div>
            </div>`).join('')}</div>`).join('');
}

function renderVillageList() {
    document.getElementById('village-list').innerHTML = villages.map(v => `
        <div style="background:var(--blue-light); padding:10px 15px; border-radius:20px; display:flex; gap:10px; align-items:center">
            <span>${v}</span><button onclick="removeVillage('${v}')" style="border:none; background:none; cursor:pointer; color:red">✕</button>
        </div>`).join('');
}

function switchTab(t) {
    document.querySelectorAll('.tab-section').forEach(s => s.style.display='none');
    document.getElementById('tab-'+t).style.display='block';
    document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
    event.currentTarget.classList.add('active');
    document.getElementById('page-title').textContent = t.charAt(0).toUpperCase() + t.slice(1);
}

function openAdd() { editId = null; document.getElementById('modal').classList.add('open'); }
function openEdit(id) {
    editId = id; const d = data[id];
    document.getElementById('f-cardno').value = d.cardNo;
    document.getElementById('f-name').value = d.name;
    document.getElementById('f-father').value = d.father;
    document.getElementById('f-caste').value = d.caste||'';
    document.getElementById('f-village').value = d.village;
    document.getElementById('f-category').value = d.category;
    document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }

function saveRecord() {
    const rec = {
        cardNo: document.getElementById('f-cardno').value,
        name: document.getElementById('f-name').value,
        father: document.getElementById('f-father').value,
        caste: document.getElementById('f-caste').value,
        village: document.getElementById('f-village').value,
        category: document.getElementById('f-category').value
    };
    const {db,ref,push,update} = window._fb;
    (editId ? update(ref(db, 'beneficiaries/'+editId), rec) : push(ref(db, 'beneficiaries'), rec)).then(() => closeModal());
}

function deleteRecord(id) { if(confirm('Delete this beneficiary?')) window._fb.remove(window._fb.ref(window._fb.db, 'beneficiaries/'+id)); }

function addVillage() {
    const v = prompt('Enter Village Name:');
    if(v) {
        const newList = [...villages, v];
        window._fb.set(window._fb.ref(window._fb.db, 'villages'), Object.fromEntries(newList.map((x,i)=>[i,x])));
    }
}
function removeVillage(v) {
    if(confirm('Remove this village?')) {
        const newList = villages.filter(x => x !== v);
        window._fb.set(window._fb.ref(window._fb.db, 'villages'), Object.fromEntries(newList.map((x,i)=>[i,x])));
    }
}
</script>
</body>
</html>
